services:
  gateway-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/gateway-service dev"
    ports:
      - "5020:5020"
    environment:
      CI: "true"
      HOST: 0.0.0.0
      PORT: 5020
      AUTH_GRPC_URL: auth-service:50051
      ROOMS_GRPC_URL: room-service:50052
      NOTIFICATIONS_GRPC_URL: notification-service:50053
      CHAT_GRPC_URL: chat-service:50054
      PAYMENT_GRPC_URL: payment-service:50055
      ACCESS_SESSION_COOKIE_MAX_AGE_SECONDS: 900
      REFRESH_SESSION_COOKIE_MAX_AGE_SECONDS: 604800
      COOKIE_SECURE: "false"
    volumes:
      - ..:/workspace
    depends_on:
      - auth-service
      - chat-service
      - payment-service
      - kafka
      - postgres
      - redis

  auth-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/auth-service dev"
    ports:
      - "50051:50051"
    environment:
      CI: "true"
      GRPC_URL: 0.0.0.0:50051
      DATABASE_URL: postgres://web_rtc:web_rtc@postgres:5432/web_rtc
      REDIS_URL: redis://redis:6379
      ACCESS_SESSION_TTL_SECONDS: 900
      REFRESH_SESSION_TTL_SECONDS: 604800
    volumes:
      - ..:/workspace
    depends_on:
      - postgres
      - redis

  chat-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/chat-service dev"
    ports:
      - "5022:5022"
      - "50054:50054"
    environment:
      CI: "true"
      HOST: 0.0.0.0
      PORT: 5022
      GRPC_URL: 0.0.0.0:50054
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: web_rtc
      DATABASE_PASSWORD: web_rtc
      DATABASE_NAME: web_rtc
      DATABASE_SSL: "false"
    volumes:
      - ..:/workspace
    depends_on:
      - postgres

  payment-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/payment-service dev"
    ports:
      - "50055:50055"
    environment:
      CI: "true"
      GRPC_URL: 0.0.0.0:50055
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: web_rtc
      DATABASE_PASSWORD: web_rtc
      DATABASE_NAME: web_rtc
      DATABASE_SSL: "false"
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: payment-service
      KAFKA_GROUP_ID: payment-service
      PAYMENT_OUTBOX_POLL_INTERVAL_MS: 1000
    volumes:
      - ..:/workspace
    depends_on:
      - kafka
      - postgres

  signaling-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/signaling-service dev"
    ports:
      - "5021:5021"
    environment:
      CI: "true"
      HOST: 0.0.0.0
      PORT: 5021
    volumes:
      - ..:/workspace

  postgres:
    image: postgres:17-alpine
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: web_rtc
      POSTGRES_PASSWORD: web_rtc
      POSTGRES_DB: web_rtc
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

volumes:
  postgres-data:
