services:
  gateway-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/gateway-service dev"
    ports:
      - "5020:5020"
    env_file:
      - ../apps/server/gateway-service/.env.production
    environment:
      CI: "true"
    volumes:
      - ..:/workspace
    depends_on:
      - auth-service
      - chat-service
      - payment-service
      - kafka
      - postgres
      - redis

  auth-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/auth-service dev"
    ports:
      - "50051:50051"
    env_file:
      - ../apps/server/auth-service/.env.production
    environment:
      CI: "true"
    volumes:
      - ..:/workspace
    depends_on:
      - postgres
      - redis

  chat-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/chat-service dev"
    ports:
      - "5022:5022"
      - "50054:50054"
    env_file:
      - ../apps/server/chat-service/.env.production
    environment:
      CI: "true"
    volumes:
      - ..:/workspace
    depends_on:
      - postgres

  payment-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/payment-service dev"
    ports:
      - "50055:50055"
    env_file:
      - ../apps/server/payment-service/.env.production
    environment:
      CI: "true"
    volumes:
      - ..:/workspace
    depends_on:
      - kafka
      - postgres

  signaling-service:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @web-rtc-nest/signaling-service dev"
    ports:
      - "5021:5021"
    env_file:
      - ../apps/server/signaling-service/.env.production
    environment:
      CI: "true"
    volumes:
      - ..:/workspace

  postgres:
    image: postgres:17-alpine
    ports:
      - "5438:5432"
    env_file:
      - ./.env.production
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

volumes:
  postgres-data:
