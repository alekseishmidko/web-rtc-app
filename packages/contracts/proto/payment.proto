syntax = "proto3";

package payment;

service PaymentService {
  rpc CreateOperation (CreatePaymentOperationRequest) returns (PaymentOperation);
  rpc GetOperation (GetPaymentOperationRequest) returns (PaymentOperation);
  rpc ListOperations (ListPaymentOperationsRequest) returns (ListPaymentOperationsResponse);
}

message CreatePaymentOperationRequest {
  string user_id = 1;
  string type = 2;
  string currency = 3;
  string amount = 4;
  string reason = 5;
}

message GetPaymentOperationRequest {
  string operation_id = 1;
}

message ListPaymentOperationsRequest {
  string user_id = 1;
  int32 limit = 2;
}

message ListPaymentOperationsResponse {
  repeated PaymentOperation operations = 1;
}

message PaymentOperation {
  string id = 1;
  string user_id = 2;
  string type = 3;
  string status = 4;
  string currency = 5;
  string amount = 6;
  string reason = 7;
  string created_at = 8;
  string updated_at = 9;
}
