syntax = "proto3";

package chat;

service ChatService {
  rpc ListMessages (ListMessagesRequest) returns (ListMessagesResponse);
  rpc DeleteMessages (DeleteMessagesRequest) returns (DeleteMessagesResponse);
  rpc ClearHistory (ClearHistoryRequest) returns (ClearHistoryResponse);
}

message ListMessagesRequest {
  string conversation_id = 1;
  string user_id = 2;
  int32 limit = 3;
  string before_message_id = 4;
}

message DeleteMessagesRequest {
  string user_id = 1;
  repeated string message_ids = 2;
}

message ClearHistoryRequest {
  string conversation_id = 1;
  string user_id = 2;
}

message ListMessagesResponse {
  repeated ChatMessage messages = 1;
}

message DeleteMessagesResponse {
  repeated string deleted_message_ids = 1;
}

message ClearHistoryResponse {
  string conversation_id = 1;
  int32 deleted_count = 2;
}

message ChatMessage {
  string id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  string text = 4;
  string edited_at = 5;
  string deleted_at = 6;
  string created_at = 7;
  repeated ChatMediaAttachment attachments = 8;
}

message ChatMediaAttachment {
  string id = 1;
  string message_id = 2;
  string media_id = 3;
  string upload_id = 4;
  string file_name = 5;
  string mime_type = 6;
  int64 size_bytes = 7;
  string status = 8;
  string metadata_json = 9;
  string created_at = 10;
}
