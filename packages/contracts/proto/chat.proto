syntax = "proto3";

package chat;

service ChatService {
  rpc CreateDirectChat (CreateDirectChatRequest) returns (ChatConversation);
  rpc CreateGroupChat (CreateGroupChatRequest) returns (ChatConversation);
  rpc SyncRoomChat (SyncRoomChatRequest) returns (ChatConversation);
  rpc SendMessage (SendMessageRequest) returns (ChatMessage);
  rpc EditMessage (EditMessageRequest) returns (ChatMessage);
  rpc ListMessages (ListMessagesRequest) returns (ListMessagesResponse);
  rpc DeleteMessages (DeleteMessagesRequest) returns (DeleteMessagesResponse);
  rpc ClearHistory (ClearHistoryRequest) returns (ClearHistoryResponse);
  rpc GetParticipantIds (GetParticipantIdsRequest) returns (GetParticipantIdsResponse);
}

message CreateDirectChatRequest {
  string initiator_id = 1;
  string participant_id = 2;
}

message CreateGroupChatRequest {
  string creator_id = 1;
  repeated string participant_ids = 2;
  string title = 3;
}

message SyncRoomChatRequest {
  string room_id = 1;
  string user_id = 2;
  repeated string participant_ids = 3;
  string title = 4;
}

message SendMessageRequest {
  string conversation_id = 1;
  string sender_id = 2;
  string text = 3;
  repeated ChatMediaAttachmentDraft attachments = 4;
}

message EditMessageRequest {
  string message_id = 1;
  string editor_id = 2;
  string text = 3;
  repeated ChatMediaAttachmentDraft attachments = 4;
  bool attachments_provided = 5;
}

message GetParticipantIdsRequest {
  string conversation_id = 1;
}

message GetParticipantIdsResponse {
  repeated string participant_ids = 1;
}

message ListMessagesRequest {
  string conversation_id = 1;
  string user_id = 2;
  int32 limit = 3;
  string before_message_id = 4;
}

message DeleteMessagesRequest {
  string user_id = 1;
  repeated string message_ids = 2;
}

message ClearHistoryRequest {
  string conversation_id = 1;
  string user_id = 2;
}

message ListMessagesResponse {
  repeated ChatMessage messages = 1;
}

message DeleteMessagesResponse {
  repeated string deleted_message_ids = 1;
}

message ClearHistoryResponse {
  string conversation_id = 1;
  int32 deleted_count = 2;
}

message ChatConversation {
  string id = 1;
  string type = 2;
  string title = 3;
  string room_id = 4;
  string created_by = 5;
  string created_at = 6;
  string updated_at = 7;
}

message ChatMessage {
  string id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  string text = 4;
  string edited_at = 5;
  string deleted_at = 6;
  string created_at = 7;
  repeated ChatMediaAttachment attachments = 8;
}

message ChatMediaAttachmentDraft {
  string media_id = 1;
  string upload_id = 2;
  string file_name = 3;
  string mime_type = 4;
  int64 size_bytes = 5;
  string status = 6;
  string metadata_json = 7;
}

message ChatMediaAttachment {
  string id = 1;
  string message_id = 2;
  string media_id = 3;
  string upload_id = 4;
  string file_name = 5;
  string mime_type = 6;
  int64 size_bytes = 7;
  string status = 8;
  string metadata_json = 9;
  string created_at = 10;
}
